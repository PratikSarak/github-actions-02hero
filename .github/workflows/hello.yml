# This is workflow name
name: Hello
# automatic pipline work when code in commited
on:
  push: 
  
  
    

# these are jobs inside the workflow
jobs:
  # first job
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: say hello to users
        run: echo "Hello From Pratik"

      - name: say hello to username
        run: echo "Hello $USER"

  # second job
  details:
    needs: greet
    runs-on: ubuntu-latest

    steps:
      - name: version of docker and python
        run: docker --version && python --version
        
