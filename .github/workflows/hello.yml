# This is workflow name
name: Hello

on:
  push:
    branches: [main]

# these are jobs inside the workflow
jobs:
  # this is the name of the job
  greet:
    runs-on: ubuntu-latest

    steps:
      - name: say hello to users
        run: echo "Hello From Pratik"

      - name: say hello to username
        run: echo "Hello $USER"
        
 details:
  runs-out: ubuntu-latest
  steps:
    - name: version of python
      run: docker --version && python --version
        
